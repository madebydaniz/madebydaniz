    <style>
      html.has-scroll-smooth {
        overflow: hidden;
      }
      :root {
        --primary: #fba754;
        --pink: #ef3c66;
        --off-white: #f7f8fb;
        --white: #fff;
        --black: #182939;
        --dark-gray: #555;
        --border: #ddd;
        --bold-font: 500;
        --body: 2rem;
        --h1: 5rem;
        --ico-dimension: 8rem;
        --nav-height: 10rem;
      }
      *,
      :after,
      :before {
        box-sizing: inherit;
        margin: 0;
        outline: 0;
        padding: 0;
      }
      html {
        -webkit-tap-highlight-color: transparent;
        font-size: 62.5%;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: var(--white);
        box-sizing: border-box;
        color: var(--black);
        font-size: var(--body);
        font-family: Roboto, sans-serif;
      }
      body,
      h1 {
        font-weight: 400;
      }
      h1 {
        font-size: var(--h1);
        letter-spacing: -3.5px;
        line-height: calc(var(--h1) * 1.07);
      }
      h4 {
        font-size: var(--h4);
        font-weight: var(--bold-font);
      }
      .wrapper {
        margin: 0 auto;
        max-width: 1280px;
        width: 90%;
      }
      @-webkit-keyframes move-up-down {
        0% {
          -webkit-transform: translateX(-50%) translateY(calc(-50% + 10px));
          transform: translateX(-50%) translateY(calc(-50% + 10px));
        }
        to {
          -webkit-transform: translateX(-50%) translateY(calc(-50% - 10px));
          transform: translateX(-50%) translateY(calc(-50% - 10px));
        }
      }
      @keyframes move-up-down {
        0% {
          -webkit-transform: translateX(-50%) translateY(calc(-50% + 10px));
          transform: translateX(-50%) translateY(calc(-50% + 10px));
        }
        to {
          -webkit-transform: translateX(-50%) translateY(calc(-50% - 10px));
          transform: translateX(-50%) translateY(calc(-50% - 10px));
        }
      }
      .cursor {
        left: 0;
        pointer-events: none;
        position: fixed;
        top: 0;
        transition: opacity 0.3s;
        will-change: transform;
        z-index: 99;
      }
      @media only screen and (hover: none) {
        .cursor {
          display: none;
        }
      }
      .cursor .cursor-inner {
        background-color: transparent;
        border: 1px solid var(--primary);
        border-radius: 50%;
        height: var(--gap-4);
        -webkit-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
        transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        width: var(--gap-4);
      }
      .cursor.active .cursor-inner {
        background-color: var(--black);
        border-color: rgba(255, 255, 255, 0.2);
        height: 100px;
        position: relative;
        width: 100px;
      }
      .cursor.active .cursor-inner:after {
        color: var(--white);
        content: 'Know More';
        font-size: 1.4rem;
        font-weight: 400;
        left: 50%;
        letter-spacing: 0.05rem;
        line-height: 1.15;
        position: absolute;
        text-align: center;
        top: 50%;
        -webkit-transform: translate(-50%, -50%);
        transform: translate(-50%, -50%);
      }
      .cursor.active.case-study .cursor-inner:after {
        content: 'Case Study';
      }
      .cursor.active.rust .cursor-inner:after {
        content: 'crates.io';
      }
      .cursor.active.github .cursor-inner:after {
        content: 'Github';
      }
      .cursor.expand {
        z-index: 0;
      }
      .cursor.expand .cursor-inner {
        background-position: 50%;
        background-repeat: no-repeat;
        background-size: cover;
        border-color: rgba(255, 255, 255, 0.2);
        border-radius: 0;
        height: 200px;
        width: 300px;
      }
      .reveal-bg {
        background-color: var(--primary);
        height: 100%;
        left: 0;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 11;
      }
      .reveal-bg,
      .reveal-bg .loading {
        align-items: center;
        display: flex;
        justify-content: center;
      }
      .reveal-bg .loading {
        -webkit-animation: loading 1s ease-in-out infinite alternate;
        animation: loading 1s ease-in-out infinite alternate;
        background-color: var(--black);
        border-radius: 20rem;
        color: var(--white);
        font-size: 1.6rem;
        height: 7.5rem;
        -webkit-transform: scale(1);
        transform: scale(1);
        width: 7.5rem;
      }
      @-webkit-keyframes loading {
        to {
          -webkit-transform: scale(2);
          transform: scale(2);
        }
      }
      @keyframes loading {
        to {
          -webkit-transform: scale(2);
          transform: scale(2);
        }
      }
      .hero {
        background-color: var(--white);
        overflow: hidden;
        height: 100vh;
        display: flex;
        align-items: center;
      }
      .hero .wrapper {
        position: relative;
      }
      .hero .hero-content {
        pointer-events: none;
        position: relative;
        z-index: 1;
      }
      .hero h3 {
        display: inline-block;
        position: relative;
      }
      .hero h3:after {
        background-color: var(--pink);
        content: '';
        height: 2px;
        left: calc(100% + 1rem);
        position: absolute;
        top: 45%;
        width: 50px;
      }
      .hero h1 {
        left: -0.7rem;
        margin-top: 3rem;
        position: relative;
        z-index: 1;
      }
      .hero h1 .line {
        display: block;
        height: calc(var(--h1) * 1.2);
        overflow: hidden;
      }
      .hero h1 .line:nth-child(2) {
        left: 19.3rem;
        position: relative;
        z-index: -1;
      }
      .hero h1 .line .line-inner {
        display: inline-block;
      }
      .hero .button {
        margin-top: var(--gap-6);
      }
      .hero.hero-1 .hero-content {
        left: 10rem;
      }
      @media (max-width: 1200px) {
        .hero.hero-1 .hero-content {
          left: 0;

        padding-bottom: 0 !important;

      .hero .floating-icons > a {
        -webkit-animation: move-up-down 2s ease-in-out infinite alternate;

        position: absolute;
        -webkit-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);

      .hero .floating-icons > a,

      }
      .hero .floating-icons > a span {
        background-color: #f5f5f5;

        transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);

      .hero .floating-icons > a:before {
